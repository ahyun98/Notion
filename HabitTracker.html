<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Habit Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --point-color: #FF4D4D;
            --bg-color: #ffffff;
            --text-color: #37352f;
            --border-color: #edece9;
            --sub-bg: #f7f6f3;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #191919;
                --text-color: #efefef;
                --border-color: #2f2f2f;
                --sub-bg: #222222;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 650px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-btn { background: none; border: 1px solid var(--border-color); color: var(--text-color); padding: 5px 10px; cursor: pointer; border-radius: 5px; }
        
        /* 습관 추가 입력창 */
        .add-habit-container { display: flex; gap: 10px; margin-bottom: 20px; }
        #new-habit-input { 
            flex: 1; padding: 8px 12px; border: 1px solid var(--border-color); 
            border-radius: 5px; background: var(--sub-bg); color: var(--text-color);
        }
        .add-btn { background: var(--point-color); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 0.85rem; }
        th, td { border: 1px solid var(--border-color); padding: 10px 5px; text-align: center; }
        th { background: var(--sub-bg); }
        
        .habit-name-cell { 
            text-align: left; padding-left: 10px; min-width: 120px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .del-btn { 
            color: #ccc; cursor: pointer; font-size: 12px; margin-right: 5px;
            transition: color 0.2s;
        }
        .del-btn:hover { color: var(--point-color); }

        input[type="checkbox"] {
            appearance: none; width: 18px; height: 18px; border: 2px solid var(--border-color);
            border-radius: 4px; cursor: pointer; position: relative;
        }
        input[type="checkbox"]:checked { background-color: var(--point-color); border-color: var(--point-color); }
        input[type="checkbox"]:checked::after { content: '✔'; position: absolute; color: white; font-size: 12px; top: -1px; left: 2px; }

        .progress-wrapper { width: 60px; background: var(--border-color); height: 8px; border-radius: 4px; overflow: hidden; margin: 0 auto; }
        .progress-bar { height: 100%; background: var(--point-color); transition: width 0.3s; }
        .percent-text { font-size: 0.7rem; display: block; margin-top: 4px; }

        .chart-container { margin-top: 20px; padding: 15px; background: var(--sub-bg); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button class="nav-btn" onclick="changeWeek(-1)">◀</button>
        <h2 id="week-title"></h2>
        <button class="nav-btn" onclick="changeWeek(1)">▶</button>
    </div>

    <div class="add-habit-container">
        <input type="text" id="new-habit-input" placeholder="새로운 습관을 입력하세요 (예: 명상하기)">
        <button class="add-btn" onclick="addHabit()">추가</button>
    </div>

    <table id="habit-table">
        <thead>
            <tr>
                <th>습관/계획</th>
                <th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th><th>일</th>
                <th>진행률</th>
            </tr>
        </thead>
        <tbody id="habit-body"></tbody>
    </table>

    <div class="chart-container">
        <canvas id="habitChart"></canvas>
    </div>
</div>

<script>
    let currentBaseDate = new Date();
    let chartInstance = null;

    // 1. 습관 리스트 불러오기 (기본값 설정)
    let myHabits = JSON.parse(localStorage.getItem('myHabitList')) || ["운동", "독서", "물 마시기"];

    function getMonday(d) {
        d = new Date(d);
        const day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1);
        return new Date(d.setDate(diff));
    }

    function getWeekKey(date) { return getMonday(date).toISOString().split('T')[0]; }

    // --- 추가/삭제 기능 ---
    window.addHabit = function() {
        const input = document.getElementById('new-habit-input');
        const name = input.value.trim();
        if (name && !myHabits.includes(name)) {
            myHabits.push(name);
            localStorage.setItem('myHabitList', JSON.stringify(myHabits));
            input.value = '';
            render();
        }
    }

    window.deleteHabit = function(name) {
        if(confirm(`'${name}' 습관을 삭제할까요?`)) {
            myHabits = myHabits.filter(h => h !== name);
            localStorage.setItem('myHabitList', JSON.stringify(myHabits));
            render();
        }
    }

    function render() {
        const weekKey = getWeekKey(currentBaseDate);
        const monday = getMonday(currentBaseDate);
        const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);

        document.getElementById('week-title').innerText = `${monday.getMonth()+1}/${monday.getDate()} ~ ${sunday.getMonth()+1}/${sunday.getDate()}`;

        const storageData = JSON.parse(localStorage.getItem('habitTracker')) || {};
        const weekData = storageData[weekKey] || {};

        const tbody = document.getElementById('habit-body');
        tbody.innerHTML = '';
        let dailyCounts = [0, 0, 0, 0, 0, 0, 0];

        myHabits.forEach(habit => {
            const row = document.createElement('tr');
            const habitData = weekData[habit] || [false, false, false, false, false, false, false];
            let successCount = 0;

            let cells = `<td class="habit-name-cell">
                            <span>${habit}</span>
                            <span class="del-btn" onclick="deleteHabit('${habit}')">✕</span>
                         </td>`;
            
            habitData.forEach((checked, i) => {
                if(checked) { successCount++; dailyCounts[i]++; }
                cells += `<td><input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleHabit('${habit}', ${i})"></td>`;
            });

            const percent = Math.round((successCount / 7) * 100);
            cells += `<td>
                <div class="progress-wrapper"><div class="progress-bar" style="width: ${percent}%"></div></div>
                <span class="percent-text">${percent}%</span>
            </td>`;
            
            row.innerHTML = cells;
            tbody.appendChild(row);
        });

        updateChart(dailyCounts);
    }

    window.toggleHabit = function(habit, dayIndex) {
        const weekKey = getWeekKey(currentBaseDate);
        let storageData = JSON.parse(localStorage.getItem('habitTracker')) || {};
        if(!storageData[weekKey]) storageData[weekKey] = {};
        if(!storageData[weekKey][habit]) storageData[weekKey][habit] = [false, false, false, false, false, false, false];

        storageData[weekKey][habit][dayIndex] = !storageData[weekKey][habit][dayIndex];
        localStorage.setItem('habitTracker', JSON.stringify(storageData));
        render();
    }

    window.changeWeek = function(offset) {
        currentBaseDate.setDate(currentBaseDate.getDate() + (offset * 7));
        render();
    }

    function updateChart(counts) {
        const ctx = document.getElementById('habitChart').getContext('2d');
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const color = isDark ? '#efefef' : '#37352f';
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['월', '화', '수', '목', '금', '토', '일'],
                datasets: [{
                    label: '성공',
                    data: counts,
                    borderColor: '#FF4D4D',
                    backgroundColor: 'rgba(255, 77, 77, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, max: Math.max(5, myHabits.length), ticks: { stepSize: 1, color: color } },
                    x: { ticks: { color: color } }
                }
            }
        });
    }

    render();
</script>
</body>
</html>
