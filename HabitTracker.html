<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Habit Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'OmuDaye';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2304-01@1.0/omyu_pretty.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Presentation';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-1Thin.woff2') format('woff2');
            font-weight: 100;
            font-display: swap;
        }

        @font-face {
            font-family: 'Presentation';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-2ExtraLight.woff2') format('woff2');
            font-weight: 200;
            font-display: swap;
        }

        @font-face {
            font-family: 'Presentation';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-3Light.woff2') format('woff2');
            font-weight: 300;
            font-display: swap;
        }

        @font-face {
            font-family: 'Presentation';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-4Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: 'Presentation';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-5Medium.woff2') format('woff2');
            font-weight: 500;
            font-display: swap;
        }

        @font-face {
            font-family: 'Presentation';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-6SemiBold.woff2') format('woff2');
            font-weight: 600;
            font-display: swap;
        }

        @font-face {
            font-family: 'Presentation';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-7Bold.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: 'Presentation';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-8ExtraBold.woff2') format('woff2');
            font-weight: 800;
            font-display: swap;
        }

        @font-face {
            font-family: 'Presentation';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-9Black.woff2') format('woff2');
            font-weight: 900;
            font-display: swap;
        }
        :root {
            --point-color: #ff7a7a; /* 포인트 다홍색 */
            --point-light: rgb(255 142 142 / 8%); /* 연한 핑크 배경 */
            --bg-color: #ffffff;
            --text-color: #1b1818;
            --border-color: #edece9;
            --sub-bg: #ffffff;
            --font-family: 'Presentation', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #191919;
                --text-color: #efefef;
                --border-color: #2f2f2f;
                --sub-bg: #222222;
                --point-light: rgba(255, 77, 77, 0.15);
            }
        }
        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 800px} /* 가로로 길게 사용 */
        
        /* 헤더 디자인 */
        .header { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 25px; }
        .nav-btn { 
            background: var(--sub-bg); border: none; color: var(--text-color); 
            padding: 8px 12px; cursor: pointer; border-radius: 8px; font-size: 0.6rem;
            transition: background 0.2s;
        }
        .nav-btn:hover { background: var(--border-color); }
        h2 { font-size: 1.4rem; font-weight: 700; margin: 0; color: var(--text-color); }

        /* 입력창 디자인 */
        .add-habit-container { display: flex; gap: 10px; margin-bottom: 25px; justify-content: flex-start; }
        #new-habit-input { 
            width: 250px; padding: 10px 15px; border: 1px solid var(--border-color); 
            border-radius: 6px; background: var(--sub-bg); color: var(--text-color);
            font-family: var(--font-family); outline: none;
        }
        .add-btn { 
            background: var(--point-color); color: white; border: none; padding: 10px 20px; 
            border-radius: 10px; cursor: pointer; font-weight: 600; transition: transform 0.1s;
        }
        .add-btn:active { transform: scale(0.95); }

        /* 테이블 디자인 */
        .table-wrapper { border-radius: 6px; overflow: hidden; border: 1px solid var(--border-color); margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; background: var(--bg-color); }
        th, td { padding: 6px 8px; text-align: center; border-bottom: 1px solid var(--border-color); }
        th { background: #ff7a7a; font-weight: 500; color: #ffffff; text-transform: uppercase; font-size: 0.85rem; padding: 12px 8px }
        tr:last-child td { border-bottom: none; }
        
        /* 습관 행 줄 맞춤 */
        .habit-name-cell { 
            text-align: left; padding-left: 15px; min-width: 150px;
            display: flex; justify-content: space-between; align-items: center; height: 30px;
        }
        .del-btn { 
            width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
            border-radius: 3px; background: var(--sub-bg); color: #ccc; cursor: pointer;
            font-size: 10px; transition: all 0.2s; border: none;
        }
        .del-btn:hover { background: var(--point-light); color: var(--point-color); transform: rotate(90deg); }

        /* 체크박스 디자인 */
        input[type="checkbox"] {
            appearance: none; width: 18px; height: 18px; border: 1px solid var(--point-color);
            border-radius: 20px; cursor: pointer; position: relative; transition: 0.2s;
        }
        input[type="checkbox"]:checked { background-color: var(--point-color); border-color: var(--point-color); }
        input[type="checkbox"]:checked::after { 
            content: '✔'; position: absolute; color: white; font-size: 14px; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        /* 프로그레스 바 */
        .progress-wrapper { width: 70px; background: var(--sub-bg); height: 8px; border-radius: 10px; overflow: hidden; margin: 0 auto; }
        .progress-bar { height: 100%; background: var(--point-color); transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .percent-text { font-size: 0.75rem; font-weight: 600; display: block; margin-top: 5px; color: var(--point-color); }

        /* 차트 영역 */
        .chart-container { 
            width: 100%; padding: 20px; background: #fffbfb; border-radius: 6px; border-color: var(--point-color);
            box-sizing: border-box; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button class="nav-btn" onclick="changeWeek(-1)">◀</button>
        <h4 id="week-title">Habit Tracker (Loading...)</h2>
        <button class="nav-btn" onclick="changeWeek(1)">▶</button>
    </div>

    <div class="add-habit-container">
        <input type="text" id="new-habit-input" placeholder="어떤 습관을 만들까요?">
        <button class="add-btn" onclick="addHabit()">추가</button>
    </div>

    <div class="table-wrapper">
        <table id="habit-table">
            <thead>
                <tr>
                    <th>습관 / 계획</th>
                    <th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th><th>일</th>
                    <th>성공률</th>
                </tr>
            </thead>
            <tbody id="habit-body"></tbody>
        </table>
    </div>

    <div class="chart-container">
        <canvas id="habitChart" height="180"></canvas>
    </div>
</div>

<script>
    let currentBaseDate = new Date();
    let chartInstance = null;
    let myHabits = JSON.parse(localStorage.getItem('myHabitList')) || ["운동하기", "독서 10분"];

    function getMonday(d) {
        d = new Date(d);
        const day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1);
        return new Date(d.setDate(diff));
    }

    function getWeekKey(date) { return getMonday(date).toISOString().split('T')[0]; }

    window.addHabit = function() {
        const input = document.getElementById('new-habit-input');
        const name = input.value.trim();
        if (name && !myHabits.includes(name)) {
            myHabits.push(name);
            localStorage.setItem('myHabitList', JSON.stringify(myHabits));
            input.value = '';
            render();
        }
    }

    window.deleteHabit = function(name) {
        // 노션 임베드 특성상 confirm 창은 방해가 되므로 즉시 삭제하도록 수정
        myHabits = myHabits.filter(h => h !== name);
        localStorage.setItem('myHabitList', JSON.stringify(myHabits));
        render();
    }

    function render() {
        const weekKey = getWeekKey(currentBaseDate);
        const monday = getMonday(currentBaseDate);
        const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);

        // 제목 형식 변경: Habit Tracker (M.D - M.D)
        const dateRange = `${monday.getMonth()+1}.${monday.getDate()} - ${sunday.getMonth()+1}.${sunday.getDate()}`;
        document.getElementById('week-title').innerText = `Habit Tracker (${dateRange})`;

        const storageData = JSON.parse(localStorage.getItem('habitTracker')) || {};
        const weekData = storageData[weekKey] || {};

        const tbody = document.getElementById('habit-body');
        tbody.innerHTML = '';
        let dailyCounts = [0, 0, 0, 0, 0, 0, 0];

        myHabits.forEach(habit => {
            const row = document.createElement('tr');
            const habitData = weekData[habit] || [false, false, false, false, false, false, false];
            let successCount = 0;

            let cells = `<td><div class="habit-name-cell">
                            <span>${habit}</span>
                            <button class="del-btn" onclick="deleteHabit('${habit}')">✕</button>
                         </div></td>`;
            
            habitData.forEach((checked, i) => {
                if(checked) { successCount++; dailyCounts[i]++; }
                cells += `<td><input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleHabit('${habit}', ${i})"></td>`;
            });

            const percent = Math.round((successCount / 7) * 100);
            cells += `<td>
                <div class="progress-wrapper"><div class="progress-bar" style="width: ${percent}%"></div></div>
                <span class="percent-text">${percent}%</span>
            </td>`;
            
            row.innerHTML = cells;
            tbody.appendChild(row);
        });

        updateChart(dailyCounts);
    }

    window.toggleHabit = function(habit, dayIndex) {
        const weekKey = getWeekKey(currentBaseDate);
        let storageData = JSON.parse(localStorage.getItem('habitTracker')) || {};
        if(!storageData[weekKey]) storageData[weekKey] = {};
        if(!storageData[weekKey][habit]) storageData[weekKey][habit] = [false, false, false, false, false, false, false];

        storageData[weekKey][habit][dayIndex] = !storageData[weekKey][habit][dayIndex];
        localStorage.setItem('habitTracker', JSON.stringify(storageData));
        render();
    }

    window.changeWeek = function(offset) {
        currentBaseDate.setDate(currentBaseDate.getDate() + (offset * 7));
        render();
    }

    function updateChart(counts) {
        const ctx = document.getElementById('habitChart').getContext('2d');
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const color = isDark ? '#efefef' : '#37352f';
        const fontSettings = { family: "'OmuDaye'", size: 14 };

        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['월', '화', '수', '목', '금', '토', '일'],
                datasets: [{
                    label: '성공',
                    data: counts,
                    borderColor: '#ff7a7a',
                    backgroundColor: 'rgba(255, 77, 77, 0.2)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 3,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#ff7a7a',
                    pointBorderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { 
                        beginAtZero: true, 
                        max: Math.max(3, myHabits.length), 
                        ticks: { stepSize: 1, color: color, font: fontSettings },
                        grid: { color: isDark ? '#2f2f2f' : 'rgb(255 142 142 / 40%)', drawBorder: false }
                    },
                    x: { 
                        ticks: { color: color, font: fontSettings },
                        grid: { display: false }
                    }
                }
            }
        });
    }

    render();
</script>
</body>
</html>
